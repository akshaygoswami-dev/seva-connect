<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Authentication | Seva Connect</title>
  <link rel="icon" type="image/png" href="images/seva-logo.png">
  <meta name="theme-color" content="#1B365D">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-image: linear-gradient(135deg, rgba(15, 35, 66, 0.95), rgba(15, 35, 66, 0.85)), url('images/hero-bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: var(--font-body);
    }
    
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      z-index: 10;
    }
    
    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.1) inset;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-logo {
      width: 72px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    
    .login-title {
      color: var(--primary-dark);
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    
    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }
    
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .form-group label {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: var(--primary-dark);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .form-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.2s;
      background: #F9FAFB;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(27, 54, 93, 0.1);
    }
    
    /* Password Eye Toggle */
    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    
    .toggle-password:hover {
      color: var(--primary);
    }
    
    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    
    .forgot-password:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
    
    .btn-login {
      width: 100%;
      padding: 1.1rem;
      font-size: 1.05rem;
      font-weight: 700;
      margin-top: 1rem;
      border-radius: 12px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 12px rgba(27, 54, 93, 0.2);
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(27, 54, 93, 0.3);
    }
    
    /* Alerts */
    .alert-message {
      padding: 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
      text-align: left;
      font-weight: 500;
      animation: fadeUp 0.3s ease;
    }
    
    .alert-error {
      color: #991B1B;
      background: #FEF2F2;
      border: 1px solid #FECACA;
    }
    
    .alert-success {
      color: #065F46;
      background: #ECFDF5;
      border: 1px solid #A7F3D0;
    }
    
    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .back-home:hover {
      color: white;
      transform: translateX(-4px);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <img src="images/seva-logo.png" alt="Seva Connect" class="login-logo">
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-subtitle">Secure access for community administrators.</p>

      <div id="loginError" class="alert-message alert-error">Invalid email or password.</div>
      <div id="loginSuccess" class="alert-message alert-success">Password reset email sent! Please check your inbox.</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" required placeholder="admin@sevaconnect.org">
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">
            <span>Password</span>
            <a class="forgot-password" id="forgotPasswordBtn">Forgot Password?</a>
          </label>
          <div class="input-wrapper">
            <input type="password" id="password" required placeholder="••••••••">
            <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Toggle password visibility">
              <!-- Eye Icon -->
              <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <!-- Eye Off Icon (Hidden by default) -->
              <svg id="eyeHide" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Secure Sign In</button>
      </form>
    </div>
    
    <a href="index.html" class="back-home">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Homepage
    </a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
